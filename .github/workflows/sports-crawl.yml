name: 시설 예약 현황 크롤링

on:
  schedule:
    - cron: '0 * * * *'  # 매 1시간마다
  workflow_dispatch:       # 수동 실행 가능

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: crawlers/requirements.txt

      - name: 의존성 설치
        run: |
          cd crawlers
          pip install -r requirements.txt

      - name: 시설 예약 크롤링 실행
        run: python crawlers/sports_crawler.py
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SPORTS_USERNAME: ${{ secrets.SPORTS_USERNAME }}
          SPORTS_PASSWORD: ${{ secrets.SPORTS_PASSWORD }}

      - name: 실패 시 알림
        if: failure()
        run: echo "::error::시설 예약 크롤링 실패! 마지막 수집 데이터가 유지됩니다."
